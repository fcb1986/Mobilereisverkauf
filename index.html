<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Armins Eisverkauf</title><style>body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0}header{background:#d94343;color:white;text-align:center;padding:18px;font-size:28px;font-weight:bold}main{max-width:520px;margin:auto;padding:15px}.card{background:white;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px #999}select,input,button{width:100%;font-size:20px;padding:13px;margin-top:8px;border-radius:10px;box-sizing:border-box}button{background:#d94343;color:white;border:0;font-weight:bold}.gruen{background:#208b3a}.grau{background:#555}.orange{background:#e07a00}.zeile{display:flex;justify-content:space-between;border-bottom:1px solid #ddd;padding:10px 0;gap:10px}.summe,.rueck{font-size:28px;font-weight:bold;text-align:right;margin-top:15px}.rueck{color:#208b3a}.info{font-size:20px;line-height:1.5}</style></head><body><header>🍦 Armins Eisverkauf</header><main><div class="card"><select id="produkt"><option value="Cornetto Buttermilch Zitrone|2">Cornetto Buttermilch Zitrone – 2,00 €</option><option value="Cornetto Haselnuss|2">Cornetto Haselnuss – 2,00 €</option><option value="Cornetto Erdbeer|2">Cornetto Erdbeer – 2,00 €</option><option value="Nogger Choc|2">Nogger Choc – 2,00 €</option><option value="Domino|1.3">Domino – 1,30 €</option><option value="Riesen Happen|1.7">Riesen Happen – 1,70 €</option><option value="Mini Milk|0.8">Mini Milk – 0,80 €</option><option value="Flutsch Finger|1.3">Flutsch Finger – 1,30 €</option><option value="Magnum Classic|2.9">Magnum Classic – 2,90 €</option><option value="Magnum White Chocolate|2.9">Magnum White Chocolate – 2,90 €</option><option value="Magnum Mandel|2.9">Magnum Mandel – 2,90 €</option><option value="Ben & Jerry's Strawberry Cheesecake|2.85">Ben & Jerry's Strawberry Cheesecake – 2,85 €</option><option value="Ben & Jerry's Cookie Dough|2.85">Ben & Jerry's Cookie Dough – 2,85 €</option><option value="Ben & Jerry's Chocolate Fudge Brownie|2.85">Ben & Jerry's Chocolate Fudge Brownie – 2,85 €</option></select><input id="anzahl" type="number" min="1" value="1"><button onclick="add()">Zur Liste hinzufügen</button></div><div class="card"><h2>Aktueller Kunde</h2><div id="liste">Noch nichts eingetragen.</div><div class="summe" id="gesamt">Gesamt: 0,00 €</div><input id="bezahlt" type="number" step="0.01" placeholder="Bezahlt mit z. B. 5" oninput="show()"><div class="rueck" id="rueckgeld">Rückgeld: 0,00 €</div><button class="gruen" onclick="bezahltUndNeu()">Bezahlt / Neuer Kunde</button><button class="grau" onclick="clearList()">Aktuelle Liste löschen</button></div><div class="card"><h2>Tagesübersicht</h2><div class="info" id="tag"></div><button class="orange" onclick="bericht()">Tagesbericht anzeigen</button><button class="grau" onclick="resetTag()">Tagesabschluss zurücksetzen</button></div><div class="card"><h2>Tagesbericht</h2><div id="bericht">Noch keine Verkäufe gespeichert.</div></div></main><script>let liste=[];let tag=JSON.parse(localStorage.getItem('eisTag')||'{"anzahl":0,"umsatz":0,"sorten":{}}');function euro(x){return x.toLocaleString('de-DE',{style:'currency',currency:'EUR'});}function bestellSumme(){return liste.reduce((s,e)=>s+e.preis*e.anzahl,0);}function add(){let d=document.getElementById('produkt').value.split('|');let anzahl=Number(document.getElementById('anzahl').value)||1;liste.push({name:d[0],preis:Number(d[1]),anzahl});document.getElementById('anzahl').value=1;show();}function del(i){liste.splice(i,1);show();}function clearList(){liste=[];document.getElementById('bezahlt').value='';show();}function bezahltUndNeu(){let ges=bestellSumme();if(ges<=0)return;let st=liste.reduce((s,e)=>s+e.anzahl,0);tag.anzahl+=st;tag.umsatz+=ges;liste.forEach(e=>{tag.sorten[e.name]=(tag.sorten[e.name]||0)+e.anzahl});localStorage.setItem('eisTag',JSON.stringify(tag));clearList();showTag();bericht();}function resetTag(){if(confirm('Tagesabschluss wirklich zurücksetzen?')){tag={anzahl:0,umsatz:0,sorten:{}};localStorage.setItem('eisTag',JSON.stringify(tag));showTag();bericht();}}function showTag(){document.getElementById('tag').innerHTML='Verkaufte Eis: <b>'+tag.anzahl+'</b><br>Tagesumsatz: <b>'+euro(tag.umsatz)+'</b>';}function show(){let box=document.getElementById('liste'),ges=bestellSumme();if(liste.length===0){box.innerHTML='Noch nichts eingetragen.';document.getElementById('gesamt').innerText='Gesamt: 0,00 €';document.getElementById('rueckgeld').innerText='Rückgeld: 0,00 €';return}box.innerHTML='';liste.forEach((e,i)=>{let sum=e.preis*e.anzahl;box.innerHTML+=`<div class="zeile"><div><b>${e.anzahl}x ${e.name}</b><br>${euro(e.preis)} pro Stück</div><div><b>${euro(sum)}</b><br><button onclick="del(${i})">X</button></div></div>`});document.getElementById('gesamt').innerText='Gesamt: '+euro(ges);let bez=Number(document.getElementById('bezahlt').value)||0;let r=bez-ges;document.getElementById('rueckgeld').innerText=r>=0?'Rückgeld: '+euro(r):'Es fehlen: '+euro(Math.abs(r));}function bericht(){let b=document.getElementById('bericht');if(tag.anzahl===0){b.innerHTML='Noch keine Verkäufe gespeichert.';return}let t='<b>Verkaufte Eis:</b> '+tag.anzahl+'<br><b>Tagesumsatz:</b> '+euro(tag.umsatz)+'<hr>';Object.keys(tag.sorten).sort().forEach(n=>t+=n+': <b>'+tag.sorten[n]+'x</b><br>');b.innerHTML=t;}show();showTag();bericht();</script></body></html>
