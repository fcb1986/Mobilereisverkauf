<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#d94343">
<title>Armins Eisverkauf</title>
<style>
:root{--rot:#d94343;--rot2:#a72d2d;--gruen:#208b3a;--orange:#e07a00;--grau:#555;--bg:#fff7ed;--card:#fff;--text:#1f2937;--muted:#6b7280;--line:#ffd7b5;--shadow:0 8px 24px rgba(80,30,10,.14)}
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;background:linear-gradient(180deg,#ffe4c7,#fff7ed);margin:0;color:var(--text)}
header{background:linear-gradient(135deg,var(--rot),var(--rot2));color:white;text-align:center;padding:16px 12px 18px;font-size:28px;font-weight:bold;box-shadow:0 4px 18px rgba(0,0,0,.18);position:sticky;top:0;z-index:5}
header img{display:block;width:100%;max-height:145px;object-fit:cover;border-radius:16px;margin:0 auto 10px;box-shadow:0 5px 16px rgba(0,0,0,.2)}
header .klein{font-size:14px;font-weight:normal;opacity:.95;margin-top:4px}
main{max-width:560px;margin:auto;padding:15px 14px 95px}
.card{background:var(--card);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow);border:1px solid var(--line)}
h2{margin:0 0 12px;color:#7c2d12;font-size:22px}
select,input,button{width:100%;font-size:20px;padding:13px;margin-top:8px;border-radius:13px;box-sizing:border-box}
select,input{border:1px solid var(--line);background:#fffaf5;color:var(--text)}
button{background:var(--rot);color:white;border:0;font-weight:bold;box-shadow:0 3px 8px rgba(0,0,0,.12)}
button:active{transform:scale(.99)}
.gruen{background:var(--gruen)}.grau{background:var(--grau)}.orange{background:var(--orange)}
.zeile{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid #ffe2c7;padding:11px 0;gap:10px}
.zeile:last-child{border-bottom:0}
.miniBtn{width:auto;padding:8px 12px;margin-top:6px;border-radius:10px;font-size:16px;background:#b91c1c}
.summe,.rueck{font-size:30px;font-weight:bold;text-align:right;margin-top:15px;color:#7c2d12}
.rueck{color:var(--gruen)}
.fehl{color:#b91c1c!important}
.info{font-size:20px;line-height:1.55;background:#fff7ed;border-radius:14px;padding:12px;border:1px solid var(--line)}
.badge{display:inline-block;background:#ffedd5;color:#7c2d12;border-radius:999px;padding:6px 10px;font-size:14px;font-weight:bold;margin-top:8px}
.footer{position:fixed;left:0;right:0;bottom:0;background:rgba(255,247,237,.96);border-top:1px solid var(--line);padding:9px 14px;backdrop-filter:blur(10px)}
.footerInner{max-width:560px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}.footer button{margin-top:0;font-size:17px;padding:12px}
@media(max-width:380px){header{font-size:24px}.summe,.rueck{font-size:26px}select,input,button{font-size:18px}}
</style>
</head>
<body>
<header><img src="banner.png" alt="Armins Eisverkauf" onerror="this.style.display='none'">🍦 Armins Eisverkauf<div class="klein">Sortiment · Rückgeld · Tagesübersicht</div></header>
<main>
<div class="card"><h2>🍨 Eis auswählen</h2><select id="produkt"><option value="Cornetto Buttermilch Zitrone|2">Cornetto Buttermilch Zitrone – 2,00 €</option><option value="Cornetto Haselnuss|2">Cornetto Haselnuss – 2,00 €</option><option value="Cornetto Erdbeer|2">Cornetto Erdbeer – 2,00 €</option><option value="Nogger Choc|2">Nogger Choc – 2,00 €</option><option value="Domino|1.3">Domino – 1,30 €</option><option value="Riesen Happen|1.7">Riesen Happen – 1,70 €</option><option value="Mini Milk|0.8">Mini Milk – 0,80 €</option><option value="Flutsch Finger|1.3">Flutsch Finger – 1,30 €</option><option value="Magnum Classic|2.9">Magnum Classic – 2,90 €</option><option value="Magnum White Chocolate|2.9">Magnum White Chocolate – 2,90 €</option><option value="Magnum Mandel|2.9">Magnum Mandel – 2,90 €</option><option value="Ben & Jerry's Strawberry Cheesecake|2.85">Ben & Jerry's Strawberry Cheesecake – 2,85 €</option><option value="Ben & Jerry's Cookie Dough|2.85">Ben & Jerry's Cookie Dough – 2,85 €</option><option value="Ben & Jerry's Chocolate Fudge Brownie|2.85">Ben & Jerry's Chocolate Fudge Brownie – 2,85 €</option></select><input id="anzahl" type="number" min="1" value="1"><button onclick="add()">➕ Zur Liste hinzufügen</button><div class="badge">Dein Sortiment bleibt gespeichert</div></div>
<div class="card"><h2>🧾 Aktueller Kunde</h2><div id="liste">Noch nichts eingetragen.</div><div class="summe" id="gesamt">Gesamt: 0,00 €</div><input id="bezahlt" type="number" step="0.01" placeholder="Bezahlt mit z. B. 5" oninput="show()"><div class="rueck" id="rueckgeld">Rückgeld: 0,00 €</div><button class="gruen" onclick="bezahltUndNeu()">✅ Bezahlt / Neuer Kunde</button><button class="grau" onclick="clearList()">Aktuelle Liste löschen</button></div>
<div class="card"><h2>📊 Tagesübersicht</h2><div class="info" id="tag"></div><button class="orange" onclick="bericht()">Tagesbericht anzeigen</button><button class="grau" onclick="resetTag()">Tagesabschluss zurücksetzen</button></div>
<div class="card"><h2>📋 Tagesbericht</h2><div class="info" id="bericht">Noch keine Verkäufe gespeichert.</div></div>
</main>
<div class="footer"><div class="footerInner"><button class="grau" onclick="clearList()">Neu</button><button class="gruen" onclick="bezahltUndNeu()">Speichern</button></div></div>
<script>
let liste=[];let tag=JSON.parse(localStorage.getItem('eisTag')||'{"anzahl":0,"umsatz":0,"sorten":{}}');
function euro(x){return Number(x||0).toLocaleString('de-DE',{style:'currency',currency:'EUR'});}
function bestellSumme(){return liste.reduce((s,e)=>s+e.preis*e.anzahl,0);}
function add(){let d=document.getElementById('produkt').value.split('|');let anzahl=Number(document.getElementById('anzahl').value)||1;liste.push({name:d[0],preis:Number(d[1]),anzahl});document.getElementById('anzahl').value=1;show();}
function del(i){liste.splice(i,1);show();}
function clearList(){liste=[];document.getElementById('bezahlt').value='';show();}
function bezahltUndNeu(){let ges=bestellSumme();if(ges<=0){alert('Bitte erst ein Eis hinzufügen.');return;}let st=liste.reduce((s,e)=>s+e.anzahl,0);tag.anzahl+=st;tag.umsatz+=ges;liste.forEach(e=>{tag.sorten[e.name]=(tag.sorten[e.name]||0)+e.anzahl});localStorage.setItem('eisTag',JSON.stringify(tag));clearList();showTag();bericht();}
function resetTag(){if(confirm('Tagesabschluss wirklich zurücksetzen?')){tag={anzahl:0,umsatz:0,sorten:{}};localStorage.setItem('eisTag',JSON.stringify(tag));showTag();bericht();}}
function showTag(){document.getElementById('tag').innerHTML='Verkaufte Eis: <b>'+tag.anzahl+'</b><br>Tagesumsatz: <b>'+euro(tag.umsatz)+'</b>';}
function show(){let box=document.getElementById('liste'),ges=bestellSumme();if(liste.length===0){box.innerHTML='Noch nichts eingetragen.';document.getElementById('gesamt').innerText='Gesamt: 0,00 €';document.getElementById('rueckgeld').innerText='Rückgeld: 0,00 €';document.getElementById('rueckgeld').className='rueck';return}box.innerHTML='';liste.forEach((e,i)=>{let sum=e.preis*e.anzahl;box.innerHTML+=`<div class="zeile"><div><b>${e.anzahl}x ${e.name}</b><br>${euro(e.preis)} pro Stück</div><div style="text-align:right"><b>${euro(sum)}</b><br><button class="miniBtn" onclick="del(${i})">X</button></div></div>`});document.getElementById('gesamt').innerText='Gesamt: '+euro(ges);let bez=Number(document.getElementById('bezahlt').value)||0;let r=bez-ges;let rg=document.getElementById('rueckgeld');rg.innerText=r>=0?'Rückgeld: '+euro(r):'Es fehlen: '+euro(Math.abs(r));rg.className=r>=0?'rueck':'rueck fehl';}
function bericht(){let b=document.getElementById('bericht');if(tag.anzahl===0){b.innerHTML='Noch keine Verkäufe gespeichert.';return}let t='<b>Verkaufte Eis:</b> '+tag.anzahl+'<br><b>Tagesumsatz:</b> '+euro(tag.umsatz)+'<hr>';Object.keys(tag.sorten).sort().forEach(n=>t+=n+': <b>'+tag.sorten[n]+'x</b><br>');b.innerHTML=t;}
show();showTag();bericht();
</script>
</body>
</html>
