<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Eisverkauf</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0}header{background:#d94343;color:white;text-align:center;padding:18px;font-size:28px;font-weight:bold}main{max-width:520px;margin:auto;padding:15px}.card{background:white;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px #999}select,input,button{width:100%;font-size:20px;padding:13px;margin-top:8px;border-radius:10px;box-sizing:border-box}button{background:#d94343;color:white;border:0;font-weight:bold}.grau{background:#555}.zeile{display:flex;justify-content:space-between;border-bottom:1px solid #ddd;padding:10px 0}.summe{font-size:28px;font-weight:bold;text-align:right;margin-top:15px}
</style></head><body>
<header>🍦 Eisverkauf</header><main>
<div class="card">
<select id="produkt">
<option value="Cornetto Buttermilch Zitrone|2">Cornetto Buttermilch Zitrone – 2,00 €</option>
<option value="Cornetto Haselnuss|2">Cornetto Haselnuss – 2,00 €</option>
<option value="Cornetto Erdbeer|2">Cornetto Erdbeer – 2,00 €</option>
<option value="Nogger Choc|2">Nogger Choc – 2,00 €</option>
<option value="Domino|1.3">Domino – 1,30 €</option>
<option value="Riesen Happen|1.7">Riesen Happen – 1,70 €</option>
<option value="Mini Milk|0.8">Mini Milk – 0,80 €</option>
<option value="Flutsch Finger|1.3">Flutsch Finger – 1,30 €</option>
<option value="Magnum Classic|2.9">Magnum Classic – 2,90 €</option>
<option value="Magnum White Chocolate|2.9">Magnum White Chocolate – 2,90 €</option>
<option value="Magnum Mandel|2.9">Magnum Mandel – 2,90 €</option>
<option value="Ben & Jerry's Strawberry Cheesecake|2.85">Ben & Jerry's Strawberry Cheesecake – 2,85 €</option>
<option value="Ben & Jerry's Cookie Dough|2.85">Ben & Jerry's Cookie Dough – 2,85 €</option>
<option value="Ben & Jerry's Chocolate Fudge Brownie|2.85">Ben & Jerry's Chocolate Fudge Brownie – 2,85 €</option>
</select>
<input id="anzahl" type="number" min="1" value="1">
<button onclick="add()">Zur Liste hinzufügen</button>
</div>

<div class="card">
<h2>Verkaufsliste</h2>
<div id="liste">Noch nichts eingetragen.</div>
<div class="summe" id="gesamt">Gesamt: 0,00 €</div>
<button class="grau" onclick="clearList()">Liste löschen</button>
</div>
</main>

<script>
let liste=[];
function euro(x){return x.toLocaleString('de-DE',{style:'currency',currency:'EUR'});}
function add(){
let [name,preis]=document.getElementById('produkt').value.split('|');
preis=Number(preis);
let anzahl=Number(document.getElementById('anzahl').value)||1;
liste.push({name,preis,anzahl});
document.getElementById('anzahl').value=1;
show();
}
function del(i){liste.splice(i,1);show();}
function clearList(){liste=[];show();}
function show(){
let box=document.getElementById('liste'),gesamt=0;
if(liste.length===0){box.innerHTML='Noch nichts eingetragen.';document.getElementById('gesamt').innerText='Gesamt: 0,00 €';return;}
box.innerHTML='';
liste.forEach((e,i)=>{
let sum=e.preis*e.anzahl;gesamt+=sum;
box.innerHTML+=`<div class="zeile"><div><b>${e.anzahl}x ${e.name}</b><br>${euro(e.preis)} pro Stück</div><div><b>${euro(sum)}</b><br><button onclick="del(${i})">X</button></div></div>`;
});
document.getElementById('gesamt').innerText='Gesamt: '+euro(gesamt);
}
</script></body></html>
